<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Example Counterpunch font destination" />
    <title>Font Destination</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="receiver-shell">
      <header class="receiver-header">
        <p class="eyebrow">Counterpunch Font Destination</p>
        <h1>Binary Font Receiver</h1>
        <p class="intro">Waiting for an exported font from Counterpunch.</p>
      </header>
      <section class="font-card" aria-live="polite">
        <div class="font-card-heading">
          <span class="status-dot" id="status-dot"></span>
          <h2 id="font-status">No font received</h2>
        </div>
        <dl class="font-details" id="font-details">
          <div>
            <dt>State</dt>
            <dd>Open this destination, then export a binary font.</dd>
          </div>
        </dl>
      </section>
    </main>
    <script>
      const assetUrls = [
        new URL("counterpunch-font-destination.js", window.location.href),
        new URL("app.js", window.location.href),
      ];
      const cacheVersion = new URLSearchParams(window.location.search).get(
        "counterpunchCacheVersion",
      );
      for (const assetUrl of assetUrls) {
        if (cacheVersion) {
          assetUrl.searchParams.set("counterpunchCacheVersion", cacheVersion);
        }
        const script = document.createElement("script");
        script.src = assetUrl.href;
        script.async = false;
        document.body.append(script);
      }
    </script>
  </body>
</html>
